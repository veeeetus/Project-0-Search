<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    </head>
    <body style="background-color: #202124;" >
        <div>
            <!-- Navbar -->
            <nav class="navbar navbar-expand background-color: #202124">
                <div class="container-fluid">
                    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link active text-light" href="#">Image</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link active text-light" href="#">Advanced</a>
                            </li>
                        </ul>
                    </div>  
                </div>
            </nav>
        </div>
        <div>
            <!-- main -->
            <div class="container" style="margin-top: 200px">
                <div class="row">

                    <div class="d-flex justify-content-center">
                        <img src="./images/logo.png" class="rounded img-fluid">
                    </div>

                    <div class="d-flex justify-content-center mt-4">
                        <form action="https://www.google.com/search">
  
                            <div class="d-flex" style="max-width: 584px; min-width: 450px;">
                                <input type="search" name="q" class="text-white p-3" style="background-color: #202124; height: 44px; border: 1px solid #5f6368; width: 100%; border-radius: 25px;">
                            </div>

                            <div class="col mt-3 text-center">
                                <input type="submit" value="Google Search" class="rounded text-white px-3 p-1 m-1" style="background-color: #303134; border: 1px solid #303134;">
                                <input type="submit" value="I'm Feeling Lucky" class="rounded text-white px-3 p-1 m-1" style="background-color: #303134; border: 1px solid #303134;">
                            </div>

                        </form>
                    </div>
                </div>
            </div>


        </div>
    </body>
</html>
