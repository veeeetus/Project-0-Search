<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    </head>
    <body style="background-color: #202124;" >
        <div>
            <!-- Navbar -->
            <nav class="navbar navbar-expand background-color: #202124">
                <div class="container-fluid">
                    <div class="collapse navbar-collapse justify-content-start">
                        <ul class="navbar-nav m-2">
                            <li class="nac-item">
                                <img src="./images/logo.png" class="rounded img-fluid" style="max-height: 25px;">
                            </li>
                        </ul>
                    </div>
                    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link active text-light" href="index.html">Google Search</a>
                            </li>
                        </ul>
                    </div>  
                </div>
            </nav>
        </div>        
        <div>
            <h4 class="text-danger m-4 p-2">Advanced search</h4>
            <hr style="color: #303134">
            <form action="https://www.google.com/search" name="f">  
                <div class="row m-5">

                    <!-- header -->
                    <div class="col-lg-2 col-md-2 col-sm-2 text-white" style="min-width: 185px;">
                        Find pages containing
                    </div>
                    <div class="col-lg-4 col-md-4 col-sm-4"></div>
                    <div class="col-lg-2 hidden-sm d-none d-lg-block text-white">
                        Examples
                    </div>
                    <div class="w-100"></div>

                    <!-- first input-->
                    <div class="col-lg-2 col-md-2 col-sm-2 col-2 text-white mt-3" style="min-width: 185px;">
                        All of the words
                    </div>
                    <div class="col-lg-4 col-md-8 col-sm-7 col-5 mt-3">
                        <input type="text" style="background: #202124; border: 1px solid #5f6368; color: #bdc1c6; padding: 1px 8px; width: 100%" name="as_q">
                    </div>
                    <div class="col-lg-5 hidden-sm d-none d-lg-block text-white mt-3">
                        Write all words for example <b>tricolor rat terrier</b>
                    </div> 
                    <div class="w-100"></div>

                    <!-- second input -->
                    <div class="col-lg-2 col-md-2 col-sm-2 col-2 text-white mt-3" style="min-width: 185px;">
                        Exactly one expression
                    </div>
                    <div class="col-lg-4 col-md-8 col-sm-7 col-5 mt-3" >
                        <input type="text" style="background: #202124; border: 1px solid #5f6368; color: #bdc1c6; padding: 1px 8px; width: 100%" name="as_epq">
                    </div>
                    <div class="col-lg-5 hidden-sm d-none d-lg-block text-white mt-3">
                        Use quotation marks <b>"Dark Batman"</b>
                    </div>  
                    <div class="w-100"></div>

                    <!-- third input -->
                    <div class="col-lg-2 col-md-2 col-sm-2 col-2 text-white mt-3" style="min-width: 185px;">
                        Any of given words
                    </div>
                    <div class="col-lg-4 col-md-8 col-sm-7 col-5 mt-3">
                        <input type="text" style="background: #202124; border: 1px solid #5f6368; color: #bdc1c6; padding: 1px 8px; width: 100%" name="as_oq">
                    </div>
                    <div class="col-lg-5 hidden-sm d-none d-lg-block text-white mt-3">
                        use OR <b>batman OR superman</b>
                    </div>
                    <div class="w-100"></div>

                    <!-- fourth input -->
                    <div class="col-lg-2 col-md-2 col-sm-2 col-2 text-white mt-3" style="min-width: 185px;">
                        None of these words
                    </div>
                    <div class="col-lg-4 col-md-8 col-sm-7 col-5 mt-3">
                        <input type="text" style="background: #202124; border: 1px solid #5f6368; color: #bdc1c6; padding: 1px 8px; width: 100%" name="as_eq">
                    </div>
                    <div class="col-lg-5 hidden-sm d-none d-lg-block text-white mt-3">
                        use dash before word <b>-robin</b>
                    </div>
                    <div class="w-100"></div>
                    
                    <div class="col-2" style="min-width: 185px;"></div>
                    <div class="col-lg-4 col-md-8 col-sm-7 col-5 mt-5 text-end">
                        <input type="submit" class="btn btn-primary" value="Advanced search">
                    </div>
                </div>
            </form>
        </div>
    </body>
</html>
